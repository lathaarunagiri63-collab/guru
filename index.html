<!DOCTYPE html>
<html>
<head>
<title>College Form</title>
<style>
body{
font-family:Arial;
background:#f2f2f2;
}
.box{
width:350px;
margin:80px auto;
padding:20px;
background:white;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px gray;
}
img{
width:100px;
}
input{
width:90%;
padding:10px;
margin:8px 0;
}
button{
width:95%;
padding:10px;
background:green;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="box">

<img src="logo.png">

<h2>Student Form</h2>

<form action="https://formspree.io/f/xrewovrp" method="POST">

<input type="text" name="student_id" placeholder="Student ID" required>

<input type="text" name="name" placeholder="Name" required>

<input type="text" name="search" placeholder="Search anything" required>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
